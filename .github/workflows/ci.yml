name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: Go server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Install Go tools
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          go install github.com/rhysd/actionlint/cmd/actionlint@latest

      - name: Lint workflows
        run: make workflow-lint

      - name: Lint
        run: make server-lint

      - name: Test
        run: make server-test

  integration:
    name: API smoke test
    runs-on: ubuntu-latest
    needs: server
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli

      - name: Start dependencies
        run: docker compose up -d postgres minio minio-create-bucket

      - name: Show dependency status
        run: docker compose ps

      - name: Wait for dependencies
        run: |
          for _ in {1..30}; do
            if docker compose exec -T postgres pg_isready -U nukon -d nukon; then
              break
            fi
            sleep 1
          done

          docker compose exec -T postgres pg_isready -U nukon -d nukon

          bucket_container="$(docker compose ps -a -q minio-create-bucket)"
          for _ in {1..30}; do
            status="$(docker inspect -f '{{.State.Status}} {{.State.ExitCode}}' "$bucket_container")"
            if [ "$status" = "exited 0" ]; then
              exit 0
            fi
            if [[ "$status" == exited\ * ]]; then
              docker compose logs minio minio-create-bucket
              exit 1
            fi
            sleep 1
          done

          docker compose logs minio minio-create-bucket
          exit 1

      - name: Run migrations
        run: make server-migrate

      - name: Start API server
        run: |
          make server-run > /tmp/nukon-server.log 2>&1 &
          echo "$!" > /tmp/nukon-server.pid

          for _ in {1..30}; do
            if curl -fsS http://localhost:18080/healthz; then
              exit 0
            fi
            sleep 1
          done

          cat /tmp/nukon-server.log
          exit 1

      - name: Run Bruno API tests
        run: make api-test

      - name: Stop services
        if: always()
        run: |
          if [ -f /tmp/nukon-server.pid ]; then
            kill "$(cat /tmp/nukon-server.pid)" 2>/dev/null || true
          fi
          docker compose logs
          docker compose down -v
