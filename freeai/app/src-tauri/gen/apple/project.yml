name: study-glass
options:
  bundleIdPrefix: com.nukon.studyglass
  deploymentTarget:
    iOS: "15.2"
fileGroups: [../../src]
configs:
  debug: debug
  release: release
settingGroups:
  app:
    base:
      PRODUCT_NAME: Study Glass
      PRODUCT_BUNDLE_IDENTIFIER: com.nukon.studyglass
targetTemplates:
  app:
    type: application
    sources:
      - path: Sources
    scheme:
      environmentVariables:
        RUST_BACKTRACE: full
        RUST_LOG: info
    settings:
      groups: [app]
targets:
  study-glass_iOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Assets.xcassets
      - path: Externals
        buildPhase: none
      - path: study-glass_iOS
      - path: assets
        buildPhase: resources
        type: folder
      - path: LaunchScreen.storyboard
    info:
      path: study-glass_iOS/Info.plist
      properties:
        LSRequiresIPhoneOS: true
        NSCameraUsageDescription: Study Glass captures the Metaglass camera view so your prompt can be answered by the selected LLM.
        NSPhotoLibraryUsageDescription: Study Glass watches for new photos imported from your Ray-Ban Meta glasses so they can be answered by the selected LLM.
        NSBluetoothAlwaysUsageDescription: Ray-Ban Metaグラスと接続するために使用します。
        NSLocalNetworkUsageDescription: グラスとWi-Fi経由で接続して映像を受信するために使用します。
        NSBonjourServices: [_bonjour._tcp]
        UIBackgroundModes: [processing, bluetooth-central, bluetooth-peripheral]
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: com.nukon.studyglass
            CFBundleURLSchemes: [studyglass]
        MWDAT:
          AppLinkURLScheme: "studyglass://"
          TeamID: $(DEVELOPMENT_TEAM)
        UILaunchStoryboardName: LaunchScreen
        UIRequiredDeviceCapabilities: [arm64, metal]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleShortVersionString: 0.1.0
        CFBundleVersion: "0.1.0"
    entitlements:
      path: study-glass_iOS/study-glass_iOS.entitlements
    scheme:
      environmentVariables:
        RUST_BACKTRACE: full
        RUST_LOG: info
    settings:
      base:
        DEVELOPMENT_TEAM: 9BW3AA9WHX
        CODE_SIGN_STYLE: Automatic
        ENABLE_BITCODE: false
        ARCHS: [arm64]
        VALID_ARCHS: arm64 
        LIBRARY_SEARCH_PATHS[arch=x86_64]: $(inherited) $(PROJECT_DIR)/Externals/x86_64/$(CONFIGURATION) $(SDKROOT)/usr/lib/swift $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/$(PLATFORM_NAME) $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift-5.0/$(PLATFORM_NAME)
        LIBRARY_SEARCH_PATHS[arch=arm64]: $(inherited) $(PROJECT_DIR)/Externals/arm64/$(CONFIGURATION) $(SDKROOT)/usr/lib/swift $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/$(PLATFORM_NAME) $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift-5.0/$(PLATFORM_NAME)
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: false
        EXCLUDED_ARCHS[sdk=iphoneos*]: x86_64
      groups: [app]
    dependencies:
      - framework: libapp.a
        embed: false
      - framework: ../../../tauri-plugin-glass-camera/ios/Frameworks/MWDATCore.framework
        embed: true
        codeSign: true
      - framework: ../../../tauri-plugin-glass-camera/ios/Frameworks/MWDATCamera.framework
        embed: true
        codeSign: true
      - sdk: CoreGraphics.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: QuartzCore.framework
      - sdk: Security.framework
      - sdk: UIKit.framework
      - sdk: WebKit.framework
    preBuildScripts:
      - script: pnpm tauri ios xcode-script -v --platform ${PLATFORM_DISPLAY_NAME:?} --sdk-root ${SDKROOT:?} --framework-search-paths "${FRAMEWORK_SEARCH_PATHS:?}" --header-search-paths "${HEADER_SEARCH_PATHS:?}" --gcc-preprocessor-definitions "${GCC_PREPROCESSOR_DEFINITIONS:-}" --configuration ${CONFIGURATION:?} ${FORCE_COLOR} ${ARCHS:?}
        name: Build Rust Code
        basedOnDependencyAnalysis: false
        outputFiles:
          - $(SRCROOT)/Externals/x86_64/${CONFIGURATION}/libapp.a
          - $(SRCROOT)/Externals/arm64/${CONFIGURATION}/libapp.a